name: CD — Despliegue Continuo

on:
  push:
    branches:
      - main

jobs:
  cd:
    name: Build, Push y Despliegue en EC2
    runs-on: ubuntu-latest
    steps:

      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Dar permisos al Gradle wrapper
        run: chmod +x gradlew

      - name: Build del JAR
        run: ./gradlew bootJar -x test -x checkstyleMain -x checkstyleTest

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y Push imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/demo-ds-univalle:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/demo-ds-univalle:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Desplegar en EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/demo-ds-univalle:latest
            docker compose -f docker-compose.prod.yml down --remove-orphans || true
            docker compose -f docker-compose.prod.yml up -d
            sleep 20
            docker compose -f docker-compose.prod.yml ps
            curl -f http://localhost:8085/demo-ds-univalle/actuator/health \
              && echo "API UP" || echo "ADVERTENCIA: API no responde"