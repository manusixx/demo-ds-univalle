name: CD — Despliegue Continuo

on:
  push:
    branches:
      - main

jobs:
  cd:
    name: Build, Push y Despliegue en EC2
    runs-on: ubuntu-latest
    steps:

      - name: Checkout del código
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configurar JDK 21
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c3089ce6cef9e1 # v4.7.0
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Cache Gradle
        uses: actions/cache@d4323d4df104b026c6a166049fb557cb5d0bedfc # v4.2.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Dar permisos al Gradle wrapper
        run: chmod +x gradlew

      - name: Build del JAR
        run: ./gradlew bootJar -x test -x checkstyleMain -x checkstyleTest

      - name: Login en Docker Hub
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5 # v3.8.0

      - name: Build y Push imagen Docker
        uses: docker/build-push-action@67a2d409c0a876cbe6b11854e3e25193efe4e62d # v5.4.0
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/demo-ds-univalle:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/demo-ds-univalle:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Preparar llave SSH
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" | base64 -d > /tmp/ssh_key
          chmod 600 /tmp/ssh_key

      - name: Desplegar en EC2
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acdf2aa1f6df0f6 # v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key_path: /tmp/ssh_key
          script: |
            cd ~/app
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/demo-ds-univalle:latest
            docker compose -f docker-compose.prod.yml down --remove-orphans || true
            docker compose -f docker-compose.prod.yml up -d
            sleep 20
            docker compose -f docker-compose.prod.yml ps
            curl -f http://localhost:8085/demo-ds-univalle/actuator/health \
              && echo "API UP" || echo "ADVERTENCIA: API no responde"