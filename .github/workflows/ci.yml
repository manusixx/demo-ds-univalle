name: CI — Integración Continua

on:
  pull_request:
    branches:
      - develop

permissions:
  contents: read
  pull-requests: write

jobs:

  ci:
    name: Build, Test y Calidad
    runs-on: ubuntu-latest
    steps:

      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Cache de dependencias Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Dar permisos al Gradle wrapper
        run: chmod +x gradlew

      - name: Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest

      - name: Tests unitarios
        run: ./gradlew test --tests "co.edu.univalle.demo.service.*"

      - name: Tests de integración con Testcontainers
        run: ./gradlew test --tests "co.edu.univalle.demo.integration.*"

      - name: Generar reporte JaCoCo
        run: ./gradlew jacocoTestReport

      - name: Verificar cobertura >= 80%
        run: ./gradlew jacocoTestCoverageVerification

      - name: Build final
        run: ./gradlew bootJar -x test

      - name: Publicar reporte JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: build/jacocoHtml/
          retention-days: 7

      - name: Publicar resultados de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/reports/tests/
          retention-days: 7

      - name: Qodo — revisión automática del PR
        uses: Codium-ai/pr-agent@main
        if: github.event_name == 'pull_request'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          pr_url: ${{ github.event.pull_request.html_url }}

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: ci
    steps:

      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Dar permisos al Gradle wrapper
        run: chmod +x gradlew

      - name: Generar reporte JaCoCo para SonarCloud
        run: ./gradlew test jacocoTestReport -x checkstyleMain -x checkstyleTest

      - name: Análisis SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar --no-daemon